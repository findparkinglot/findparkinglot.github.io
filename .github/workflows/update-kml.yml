name: Update KML

# 排程 + 手動觸發 + 推送 master 時也跑一次
# 每週三 台灣時間 11:50 = 每週三 UTC 03:50
# (刻意避開整點,降低 GitHub Actions schedule 在熱門時段被延遲的機率)
# 注意:用內建 GITHUB_TOKEN 自動 commit 推回 master 不會再觸發此 workflow,故不會無限迴圈
on:
  schedule:
    - cron: '50 3 * * 3'
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install adm-zip (no full npm install needed)
        run: npm install --no-save --no-audit --no-fund adm-zip@^0.5.10

      - name: Run update script
        run: npm run update:kml

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "src/assets/MapData/My Maps/PackingMarkerList2" "src/constants/dataUpdateDate.js"
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(kml): auto-update from Google My Maps ($(date -u +%Y-%m-%d))"
            git push
          fi
